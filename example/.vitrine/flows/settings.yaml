appId: com.example.myapp
---
# Nested Expo Router route: app/settings/account.tsx -> myapp://settings/account
# Route params work the same way:
#   app/user/[id].tsx        ->  myapp://user/42
#   app/search.tsx (?q=...)  ->  myapp://search?q=trees
- launchApp
- openLink: myapp://settings/account
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 60000
# Let entrance animations finish so the capture is pixel-stable.
- waitForAnimationToEnd
- takeScreenshot: settings
