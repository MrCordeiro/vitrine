appId: com.example.myapp
---
# Expo Router: deep-link straight to the route instead of tapping through the UI
# (deterministic, survives navigation refactors). Route: app/(tabs)/profile.tsx
# -> myapp://profile. The scheme comes from your app.json `expo.scheme`.
#
# No `clearState` (see home.yaml). On a dev-client build that shows the launcher
# you can force-load the bundle instead of `launchApp`:
#   - openLink: "myapp://expo-development-client/?url=http://localhost:8081"
- launchApp
- openLink: myapp://profile
# Wait for a real post-load element with a dev-sized timeout (Metro bundle load).
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 60000
- takeScreenshot: profile
